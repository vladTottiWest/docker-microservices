replicaCount: 3

image:
  repository: prod-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  host: "api.local"
  path: /
  tls:
    - secretName: "api-tls-secret"
      hosts:
        - "api.local"

env:
  NODE_ENV: "production"
  DB_HOST: "database-service"
  DB_NAME: "micro_db"

resources:
  requests:
    cpu: "100m" 
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50