version: '3.8'

services:
  # 1. СЕРВІС ФРОНТЕНДУ
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80" # Додаток буде доступний на http://localhost:8080
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api

  # 2. СЕРВІС БЕКЕНДУ
  backend-api:
    build: ./backend
    environment:
      - NODE_ENV=development
    depends_on:
      database:
        condition: service_healthy # Запуск тільки після того, як БД пройде тест працездатності

  # 3. СЕРВІС БАЗИ ДАНИХ (Заміна M в LAMP на незалежний сервіс)
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: micro_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    healthcheck: # Перевірка, що БД дійсно готова приймати з'єднання
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: # Збереження даних БД на локальному диску комп'ютера